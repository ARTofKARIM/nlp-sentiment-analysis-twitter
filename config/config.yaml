data:
  path: "data/twitter_sentiment.csv"
  text_column: "text"
  label_column: "sentiment"
  test_size: 0.2
  random_state: 42

preprocessing:
  lowercase: true
  remove_urls: true
  remove_mentions: true
  remove_hashtags: false
  remove_punctuation: true
  remove_stopwords: true
  lemmatize: true

models:
  tfidf:
    max_features: 10000
    ngram_range: [1, 2]
  lstm:
    max_words: 20000
    max_len: 128
    embedding_dim: 128
    lstm_units: 64
    dropout: 0.3
    epochs: 10
    batch_size: 64
